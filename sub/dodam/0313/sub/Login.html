<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DODAM Login</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./img/1-2.1.png">
    <link rel="stylesheet" href="./css/Login.css">
</head>
<body>
    <div class="login-container">
    <h1 class="logo">DODAM</h1>
    
    <form class="login-form">
        <input type="email" placeholder="이메일" class="input-field">
        <input type="password" placeholder="비밀번호" class="input-field">
        <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="footer-links">
        <p>Or</p>
        <a href="#" class="signup-link">
        혹시 회원이 아니신가요? <span>회원 가입</span>
    </a>
    </div>
</div>
</body>
</html>
